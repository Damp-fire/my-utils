<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口琴打拍器 - Metronome</title>
<style>
  /* ===== Reset & Global ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
  }
  .metronome {
    background: #16213e;
    border-radius: 24px;
    padding: 40px 48px;
    width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
  }

  /* ===== Pendulum ===== */
  .pendulum-area {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 140px;
    margin-bottom: 20px;
    position: relative;
  }
  .pendulum-pivot {
    width: 14px;
    height: 14px;
    background: #fca311;
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    box-shadow: 0 0 12px rgba(252,163,17,0.5);
  }
  .pendulum-arm {
    width: 4px;
    height: 120px;
    background: linear-gradient(to bottom, #fca311, #e85d04);
    border-radius: 2px;
    position: absolute;
    top: 6px;
    left: 50%;
    transform-origin: top center;
    transform: translateX(-50%) rotate(0deg);
    transition: transform 0.1s linear;
    z-index: 1;
  }
  .pendulum-arm.active-left { transform: translateX(-50%) rotate(-25deg); }
  .pendulum-arm.active-right { transform: translateX(-50%) rotate(25deg); }
  .pendulum-weight {
    width: 20px;
    height: 20px;
    background: #fca311;
    border-radius: 50%;
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 16px rgba(252,163,17,0.3);
  }
  .pendulum-accent {
    position: absolute;
    bottom: -40px;
    font-size: 48px;
    font-weight: bold;
    color: #fca311;
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  .pendulum-accent.show { opacity: 1; }

  /* ===== BPM Display ===== */
  .bpm-display {
    text-align: center;
    margin-bottom: 8px;
  }
  .bpm-number {
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
  }
  .bpm-label {
    font-size: 18px;
    color: #888;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: -4px;
  }

  /* ===== BPM Slider ===== */
  .bpm-slider-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 6px;
  }
  .bpm-slider-wrap input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #e85d04, #fca311);
    outline: none;
  }
  .bpm-slider-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  .bpm-slider-wrap input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .bpm-slider-wrap input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .bpm-fine { font-size: 13px; color: #999; }

  /* ===== Tap Tempo Button ===== */
  .tap-tempo-btn {
    background: #0f3460;
    border: 2px solid #1a4a7a;
    color: #e0e0e0;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .tap-tempo-btn:hover { background: #1a4a7a; border-color: #fca311; }
  .tap-tempo-btn:active { transform: scale(0.95); }

  /* ===== Beat Indicators ===== */
  .beat-indicators {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
  }
  .beat-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #2a2a4a;
    transition: all 0.1s ease;
    border: 2px solid #3a3a5a;
  }
  .beat-dot.active {
    background: #fca311;
    border-color: #fca311;
    box-shadow: 0 0 20px rgba(252,163,17,0.5);
    transform: scale(1.2);
  }
  .beat-dot.accent {
    background: #e85d04;
    border-color: #e85d04;
  }
  .beat-dot.active.accent {
    background: #ff6b00;
    border-color: #ff6b00;
    box-shadow: 0 0 24px rgba(255,107,0,0.6);
    transform: scale(1.3);
  }

  /* ===== Controls Row ===== */
  .controls-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 16px 0;
  }
  .start-btn {
    background: #fca311;
    border: none;
    color: #1a1a2e;
    padding: 14px 48px;
    border-radius: 40px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(252,163,17,0.3);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(252,163,17,0.4); }
  .start-btn:active { transform: translateY(0); }
  .start-btn.running { background: #e85d04; box-shadow: 0 4px 20px rgba(232,93,4,0.3); }
  .start-btn.running:hover { box-shadow: 0 6px 28px rgba(232,93,4,0.4); }

  /* ===== Settings Area ===== */
  .settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #2a2a4a;
  }
  .setting-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .setting-group label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .setting-group select,
  .setting-group input[type="number"] {
    background: #0f3460;
    border: 1px solid #1a4a7a;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setting-group select:focus,
  .setting-group input[type="number"]:focus { border-color: #fca311; }
  .setting-group select option { background: #16213e; }

  /* ===== Volume ===== */
  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    grid-column: span 2;
  }
  .volume-wrap input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #2a2a4a;
    outline: none;
  }
  .volume-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fca311;
    cursor: pointer;
  }
  .volume-wrap input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fca311;
    cursor: pointer;
    border: none;
  }
  .volume-icon { font-size: 18px; }

  /* ===== Status Bar ===== */
  .status-bar {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    font-size: 13px;
    color: #666;
  }
  .status-bar span { letter-spacing: 0.3px; }

  /* ===== Keyboard Shortcuts Hint ===== */
  .shortcuts-hint {
    text-align: center;
    margin-top: 14px;
    font-size: 12px;
    color: #555;
    letter-spacing: 0.5px;
  }
  .shortcuts-hint kbd {
    background: #2a2a4a;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-family: inherit;
    color: #aaa;
  }

  /* ===== Responsive ===== */
  @media (max-width: 520px) {
    .metronome {
      width: 94vw;
      padding: 24px 20px;
      border-radius: 16px;
    }
    .bpm-number { font-size: 56px; }
    .settings { grid-template-columns: 1fr; }
    .volume-wrap { grid-column: span 1; }
    .start-btn { padding: 12px 36px; font-size: 16px; }
  }
</style>
</head>
<body>
<div class="metronome">
  <!-- Pendulum -->
  <div class="pendulum-area">
    <div class="pendulum-pivot"></div>
    <div class="pendulum-arm" id="pendulumArm">
      <div class="pendulum-weight"></div>
    </div>
    <div class="pendulum-accent" id="pendulumAccent">●</div>
  </div>

  <!-- BPM Display -->
  <div class="bpm-display">
    <div class="bpm-number" id="bpmDisplay">120</div>
    <div class="bpm-label">BPM</div>
  </div>

  <!-- BPM Slider + Tap -->
  <div class="bpm-slider-wrap">
    <input type="range" id="bpmSlider" min="20" max="300" value="120" step="1">
    <button class="tap-tempo-btn" id="tapBtn">Tap</button>
  </div>

  <!-- Beat Dots -->
  <div class="beat-indicators" id="beatIndicators"></div>

  <!-- Start / Stop -->
  <div class="controls-row">
    <button class="start-btn" id="startBtn">▶ 开始</button>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="setting-group">
      <label>拍号</label>
      <select id="timeSignature">
        <option value="4">4/4</option>
        <option value="3">3/4</option>
        <option value="2">2/4</option>
        <option value="6">6/8</option>
      </select>
    </div>
    <div class="setting-group">
      <label>节奏型</label>
      <select id="subdivision">
        <option value="1">♩ 四分音符</option>
        <option value="2" selected>♪ 八分音符</option>
        <option value="3">♪♪ 三连音</option>
        <option value="4">♫ 十六分音符</option>
      </select>
    </div>
    <div class="setting-group">
      <label>音色</label>
      <select id="soundSelect">
        <option value="tick">电子嘀嗒</option>
        <option value="wood">木鱼声</option>
        <option value="click">节拍器咔嗒</option>
      </select>
    </div>
    <div class="setting-group">
      <label>重音强调</label>
      <select id="accentStyle">
        <option value="louder">加重音量</option>
        <option value="bell">铃声</option>
        <option value="none">无</option>
      </select>
    </div>
    <div class="volume-wrap">
      <span class="volume-icon">🔊</span>
      <input type="range" id="volumeSlider" min="0" max="100" value="70">
      <span class="bpm-fine" id="volumePercent">70%</span>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span id="beatCounter">-</span>
    <span id="timerDisplay">00:00</span>
  </div>
  <div class="shortcuts-hint">
    <kbd>Space</kbd> 启停 &nbsp;·&nbsp; <kbd>↑</kbd><kbd>↓</kbd> 调速度 &nbsp;·&nbsp; <kbd>F</kbd> 全屏
  </div>
</div>

<script>
// ===================================================================
//  Audio Context
// ===================================================================
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

// ===================================================================
//  Sound Generators
// ===================================================================
function playTick(volume, type) {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const gain = ctx.createGain();
  gain.connect(ctx.destination);
  gain.gain.value = volume;

  switch (type) {
    case 'tick': {
      const osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = 1500;
      const g = ctx.createGain();
      g.gain.setValueAtTime(volume, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.03);
      break;
    }
    case 'wood': {
      const bufSize = ctx.sampleRate * 0.05;
      const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.15));
      }
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const g = ctx.createGain();
      g.gain.value = volume;
      src.connect(g);
      g.connect(ctx.destination);
      src.start();
      break;
    }
    case 'click': {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 800;
      const g = ctx.createGain();
      g.gain.setValueAtTime(volume, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.02);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.02);
      // add click
      const osc2 = ctx.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.value = 2400;
      const g2 = ctx.createGain();
      g2.gain.setValueAtTime(volume * 0.5, ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.01);
      osc2.connect(g2);
      g2.connect(ctx.destination);
      osc2.start(ctx.currentTime);
      osc2.stop(ctx.currentTime + 0.01);
      break;
    }
  }
}

function playBell(volume) {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 1200;
  const g = ctx.createGain();
  g.gain.setValueAtTime(volume, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.connect(g);
  g.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.15);

  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 1800;
  const g2 = ctx.createGain();
  g2.gain.setValueAtTime(volume * 0.5, ctx.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
  osc2.connect(g2);
  g2.connect(ctx.destination);
  osc2.start(ctx.currentTime);
  osc2.stop(ctx.currentTime + 0.12);
}

// ===================================================================
//  State
// ===================================================================
const state = {
  bpm: 120,
  beatsPerMeasure: 4,   // from time signature
  subdivision: 2,       // 1=quarter, 2=eighth, 3=triplet, 4=sixteenth
  isRunning: false,
  currentBeat: 0,
  totalSubBeats: 0,     // cached
  soundType: 'tick',
  accentStyle: 'louder',
  volume: 0.7,
  timer: 0,            // seconds
};

// ===================================================================
//  DOM refs
// ===================================================================
const bpmDisplay = document.getElementById('bpmDisplay');
const bpmSlider = document.getElementById('bpmSlider');
const tapBtn = document.getElementById('tapBtn');
const startBtn = document.getElementById('startBtn');
const beatIndicators = document.getElementById('beatIndicators');
const pendulumArm = document.getElementById('pendulumArm');
const pendulumAccent = document.getElementById('pendulumAccent');
const timeSigSelect = document.getElementById('timeSignature');
const subdivSelect = document.getElementById('subdivision');
const soundSelect = document.getElementById('soundSelect');
const accentSelect = document.getElementById('accentStyle');
const volumeSlider = document.getElementById('volumeSlider');
const volumePercent = document.getElementById('volumePercent');
const beatCounter = document.getElementById('beatCounter');
const timerDisplay = document.getElementById('timerDisplay');

// ===================================================================
//  Compute total sub-beats per measure
// ===================================================================
function getTotalSubBeats() {
  return state.beatsPerMeasure * state.subdivision;
}

// ===================================================================
//  Build beat indicators
// ===================================================================
function buildBeatIndicators() {
  const total = getTotalSubBeats();
  beatIndicators.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'beat-dot';
    if (i % state.subdivision === 0) dot.classList.add('accent');
    dot.dataset.index = i;
    beatIndicators.appendChild(dot);
  }
}

// ===================================================================
//  Update BPM (slider + display)
// ===================================================================
function updateBPM(val) {
  state.bpm = Math.round(val);
  bpmDisplay.textContent = state.bpm;
  bpmSlider.value = state.bpm;
}

// ===================================================================
//  Tap Tempo
// ===================================================================
const tapTimes = [];
function handleTap() {
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 5) tapTimes.shift();
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) {
      intervals.push(tapTimes[i] - tapTimes[i - 1]);
    }
    const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    const bpm = Math.round(60000 / avg);
    if (bpm >= 20 && bpm <= 300) {
      updateBPM(bpm);
    }
  }
}

// ===================================================================
//  Play sound for a given beat index
// ===================================================================
function playBeatSound(beatIdx, isAccent) {
  const vol = state.volume;
  if (vol <= 0) return;

  if (isAccent && state.accentStyle === 'bell') {
    playBell(vol);
    return;
  }

  let actualVol = vol;
  if (isAccent && state.accentStyle === 'louder') {
    actualVol = Math.min(1, vol * 1.5);
  }
  playTick(actualVol, state.soundType);
}

// ===================================================================
//  Timer
// ===================================================================
let timerInterval = null;
function startTimer() {
  state.timer = 0;
  timerDisplay.textContent = '00:00';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    state.timer++;
    const m = String(Math.floor(state.timer / 60)).padStart(2, '0');
    const s = String(state.timer % 60).padStart(2, '0');
    timerDisplay.textContent = `${m}:${s}`;
  }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

// ===================================================================
//  Main Metronome Loop
// ===================================================================
let intervalId = null;
let subBeatIndex = 0;

function getIntervalMs() {
  // one sub-beat = (60000 / bpm) / subdivision
  return (60000 / state.bpm) / state.subdivision;
}

function scheduleNext() {
  if (!state.isRunning) return;

  const ms = getIntervalMs();
  const total = getTotalSubBeats();

  // which main beat we're on (0-based)
  const mainBeat = Math.floor(subBeatIndex / state.subdivision);
  // is this the first sub-beat of a main beat? (accent)
  const isMainBeat = (subBeatIndex % state.subdivision) === 0;
  // is it the downbeat (first beat of measure)?
  const isDownBeat = (mainBeat === 0 && isMainBeat);

  // Update beat indicators
  const dots = beatIndicators.querySelectorAll('.beat-dot');
  dots.forEach((d, i) => {
    d.classList.toggle('active', i === subBeatIndex);
  });

  // Update pendulum
  const swing = (subBeatIndex % state.subdivision) / state.subdivision;
  const angle = swing < 0.5 ? -25 : 25;
  pendulumArm.style.transform = `translateX(-50%) rotate(${angle}deg)`;

  // Accent flash
  if (isDownBeat) {
    pendulumAccent.classList.add('show');
    setTimeout(() => pendulumAccent.classList.remove('show'), 120);
  }

  // Play sound
  if (isMainBeat) {
    playBeatSound(mainBeat, isDownBeat);
  }

  // Update beat counter
  const measure = Math.floor(subBeatIndex / total) + 1;
  const beatInMeasure = mainBeat + 1;
  beatCounter.textContent = `${measure} / ${beatInMeasure}`;

  // Advance
  subBeatIndex++;
  if (subBeatIndex >= total) subBeatIndex = 0;

  // Schedule next
  // Use setTimeout with calculated interval
  intervalId = setTimeout(scheduleNext, ms);
}

function startMetronome() {
  if (state.isRunning) return;
  state.isRunning = true;
  subBeatIndex = 0;

  // Ensure audio context is ready
  getAudioCtx();

  startBtn.textContent = '■ 停止';
  startBtn.classList.add('running');
  pendulumAccent.classList.remove('show');
  startTimer();
  scheduleNext();
}

function stopMetronome() {
  if (!state.isRunning) return;
  state.isRunning = false;
  clearTimeout(intervalId);
  intervalId = null;
  startBtn.textContent = '▶ 开始';
  startBtn.classList.remove('running');
  pendulumArm.style.transform = 'translateX(-50%) rotate(0deg)';
  beatCounter.textContent = '-';
  stopTimer();
  // reset dots
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
}

function toggleMetronome() {
  if (state.isRunning) stopMetronome();
  else startMetronome();
}

// ===================================================================
//  Settings changes
// ===================================================================
timeSigSelect.addEventListener('change', () => {
  state.beatsPerMeasure = parseInt(timeSigSelect.value);
  if (state.isRunning) {
    stopMetronome();
  }
  buildBeatIndicators();
});

subdivSelect.addEventListener('change', () => {
  state.subdivision = parseInt(subdivSelect.value);
  if (state.isRunning) {
    stopMetronome();
  }
  buildBeatIndicators();
});

soundSelect.addEventListener('change', () => {
  state.soundType = soundSelect.value;
});

accentSelect.addEventListener('change', () => {
  state.accentStyle = accentSelect.value;
});

volumeSlider.addEventListener('input', () => {
  state.volume = parseInt(volumeSlider.value) / 100;
  volumePercent.textContent = `${parseInt(volumeSlider.value)}%`;
});

bpmSlider.addEventListener('input', () => {
  updateBPM(bpmSlider.value);
  // If running, restart with new tempo
  if (state.isRunning) {
    clearTimeout(intervalId);
    // Don't reset beat position, just reschedule
    scheduleNext();
  }
});

// ===================================================================
//  Tap Button
// ===================================================================
tapBtn.addEventListener('click', handleTap);

// ===================================================================
//  Start Button
// ===================================================================
startBtn.addEventListener('click', toggleMetronome);

// ===================================================================
//  Keyboard Shortcuts
// ===================================================================
document.addEventListener('keydown', (e) => {
  // Don't trigger if user is typing in a select/input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.code === 'Space') {
    e.preventDefault();
    toggleMetronome();
  }
  if (e.code === 'ArrowUp') {
    e.preventDefault();
    updateBPM(Math.min(300, state.bpm + 1));
    if (state.isRunning) {
      clearTimeout(intervalId);
      scheduleNext();
    }
  }
  if (e.code === 'ArrowDown') {
    e.preventDefault();
    updateBPM(Math.max(20, state.bpm - 1));
    if (state.isRunning) {
      clearTimeout(intervalId);
      scheduleNext();
    }
  }
  if (e.code === 'KeyF') {
    e.preventDefault();
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  }
});

// ===================================================================
//  Init
// ===================================================================
buildBeatIndicators();
</script>
</body>
